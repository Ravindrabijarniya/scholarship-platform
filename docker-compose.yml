version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: scholarship_postgres
    environment:
      POSTGRES_DB: scholarship_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: scholarship_redis
    ports:
      - "6379:6379"

  springboot-app:
    build: .
    container_name: scholarship_app
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"

volumes:
  postgres_data: